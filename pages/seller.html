
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seller panel</title>
   <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000000;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
            top:0;
            box-sizing: border-box;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1, h2 {
            margin: 10px 0;
            color: #fff;
        }

        .form input, .form button ,input {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            
        }

        .form input,input {
            width: 100%;
        }

        .create-btn{
            background-color: purple;
            color: white;
            cursor: pointer;
            width: 100%;
            border-radius: 50px;
           
        }

        .search input, .search button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            width: 1200px;
        }
        .search button{
            width: 1220px;
        }


        .search button {
            background-color: purple;
            color: white;
            cursor: pointer;
        }

        .delete-all-btn ,#submit{
            margin: 20px 0;
            padding: 10px 20px;
            background-color: purple;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            padding: 10px;
            border: 1px solid #444;
            text-align: center;
        }

        table th {
            background-color: purple;
            color: white;
        }

        table td button {
            padding: 5px 15px;
            background-color: purple;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            
        }
        img{
            width: 50px;
            height: 50px;
        }
      
    </style>
</head>
<body> 
<div>
    <a href="#"><i class="fa-solid fa-arrow-right-from-bracket" style="float: right; margin-right: 20px;"></i></a>
</div>
    <div class="container">
 
        <h1>Seller Panel</h1>
        <form id="product-form">
            <input type="text" id="name" placeholder="Product Name" required>
            <input type="number" id="price" placeholder="Price" required>
            <input type="number" id="stock" placeholder="Stock" required>
            <input type="file" id="image"name="image" accept="image/*" style="background-color: white ;color: black;">
            <button type="submit" id="submit">Add Product</button></form>
  
        
        
        <div class="search">
            <input type="text" placeholder="Search">
            <button>Search By Title</button>
            <button>Search By Category</button>
        </div>
        <button class="delete-all-btn">Delete All </button>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>TITLE</th>
                    <th>PRICE</th>
                    <th>STOCK</th>
                    <th>image</th>
                    <th>UPDATE</th>
                   

                </tr>
            </thead>
            <tbody id="products-table-body">
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td><button>Update</button>
                        <button>Delete</button></td>
                
                  
                </tr>
            </tbody>
        </table>
    
    </div>


    <script type="module" src="../scripts/seller.js"></script>
</body>
</html>
